<title>Jugglesmith — Pattern Drop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#e8e8f0;font-family:'Orbitron',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
h1{font-size:clamp(2rem,8vw,4rem);font-weight:900;line-height:.92;
  background:linear-gradient(180deg,#fff 10%,#ff6b35 55%,#cc2200 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(255,80,30,.4))}
.sub{font-size:.6rem;letter-spacing:5px;color:#00e5cc;opacity:.5;margin:8px 0 30px}
.desc{font-size:.5rem;color:#666;line-height:1.8;max-width:500px;margin:0 auto 30px;letter-spacing:.5px;font-family:system-ui,sans-serif}
.badge{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#ff6b35,#ffaa00);
  color:#000;font-weight:700;font-size:.7rem;letter-spacing:3px;border-radius:50px;text-decoration:none;
  box-shadow:0 0 30px rgba(255,107,53,.3);transition:transform .2s}
.badge:hover{transform:scale(1.05)}
.links{margin-top:40px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.links a{color:#555;font-size:.35rem;letter-spacing:2px;text-decoration:none;transition:color .2s}
.links a:hover{color:#00e5cc}
.footer{margin-top:60px;font-size:.3rem;color:#333;letter-spacing:2px}
</style>
</head>

<h1>PATTERN<br>DROP</h1>
